phases:
  - id: mvp
    name: MVP
    description: Минимально жизнеспособный продукт
    order: 1
  - id: support
    name: Сопровождение
    description:
      Диагностика, ответы по коду и технические доработки без изменения
      продуктового описания
    order: 2
tasks:
  - id: task-001
    phase: mvp
    title: Визуальная заглушка главной страницы и базовая структура приложения
    description:
      Создать главную страницу приложения с боковым меню (Sidebar) для
      переключения вкладок. Реализовать тёмную индустриальную тему. Настроить
      структуру данных в LocalStorage для пользователей, катушек, заказов,
      постов и настроек. Первая задача — чтобы пользователь сразу увидел
      работающий интерфейс с навигацией.
    priority: high
    acceptance_criteria:
      - Главная страница отображается с боковым меню
      - Боковое меню содержит иконки и названия вкладок
      - Тёмная тема включена по умолчанию
      - Структура данных в LocalStorage инициализирована
    depends_on: []
    related_feature: Авторизация и профили
    status: completed
    summary: "Реализована главная страница с боковым меню (6 вкладок: Дашборд,
      Склад, Калькулятор, Заказы, Лента, Настройки) и тёмной индустриальной
      темой. Основные файлы: components/app-shell.tsx (клиентский компонент с
      Sidebar и переключением вкладок), lib/storage.ts (типы данных и
      инициализация LocalStorage для пользователей, катушек, заказов, постов и
      настроек). app/globals.css содержит кастомные CSS-переменные тёмной темы и
      утилиты."
  - id: task-002
    phase: mvp
    title: Авторизация и профили пользователей
    description: Реализовать экран входа/регистрации. При первом запуске
      показывается форма входа. Можно зарегистрироваться (имя + пароль) или
      войти в существующий аккаунт. После входа пользователь видит основное
      приложение со своими данными. Выход возвращает на экран входа. Данные
      каждого пользователя изолированы.
    priority: high
    acceptance_criteria:
      - При запуске показывается экран входа
      - Можно зарегистрироваться с именем и паролем
      - Можно войти в существующий аккаунт
      - После входа отображается основное приложение с данными пользователя
      - Кнопка выхода возвращает на экран входа
    depends_on:
      - task-001
    related_feature: Авторизация и профили
    status: completed
    summary: "Реализован экран входа/регистрации с переключением между режимами.
      Основные файлы: components/auth-provider.tsx (контекст авторизации c
      login/register/logout; сессия через sessionStorage),
      components/auth-screen.tsx (форма входа/регистрации с валидацией, иконками
      и переключением режимов), app/page.tsx (показывает AuthScreen при
      отсутствии пользователя или AppShell после входа). В sidebar добавлено имя
      пользователя и кнопка выхода."
  - id: task-003
    phase: mvp
    title: Учёт катушек с пластиком (Filament Stock)
    description:
      Реализовать вкладку склада пластика. Модальное окно для добавления
      катушки (производитель, тип пластика, цвет, начальный вес, цена). Сетка
      карточек с прогресс-баром остатка. Кнопки +/- 50г на карточке. При остатке
      < 150г — жёлтое предупреждение. При 0 — статус «Закончился».
    priority: high
    acceptance_criteria:
      - Можно добавить новую катушку через модальное окно
      - Катушки отображаются карточками с прогресс-баром
      - Кнопки +/- 50г меняют остаток
      - При остатке < 150г карточка подсвечивается жёлтым
      - При остатке 0 катушка помечается как закончившаяся
    depends_on:
      - task-002
    related_feature: Учёт катушек с пластиком (Filament Stock)
    status: completed
    summary: "Реализован склад катушек с пластиком. Основные файлы:
      components/filament-stock.tsx (клиентский компонент с модальным окном
      добавления катушки, сеткой карточек, прогресс-баром остатка, кнопками
      +/-50г, жёлтым предупреждением при остатке < 150г и статусом «Закончился»
      при 0г), компонент подключён в app-shell.tsx вместо заглушки StockTab.
      Данные хранятся в LocalStorage через существующую модель FilamentSpool из
      lib/storage.ts."
  - id: task-004
    phase: mvp
    title: Калькулятор себестоимости заказа
    description:
      "Реализовать вкладку калькулятора. Поля: масса изделия (г), время
      печати (ч), выбор катушки из склада, галочка постобработки. Мгновенный
      расчёт: себестоимость пластика, стоимость работы (время × тариф +
      амортизация), общая себестоимость, маржинальность, чистая прибыль. Поле
      «Окончательная стоимость» (не меньше итоговой). Кнопка «Оформить как
      заказ»."
    priority: high
    acceptance_criteria:
      - Все поля ввода работают и обновляют расчёты мгновенно
      - Себестоимость пластика рассчитывается корректно
      - Стоимость работы = время × тариф + амортизация
      - Галочка постобработки включает/отключает блок настройки
      - Отображается чистая прибыль и маржинальность
      - Окончательная стоимость не может быть меньше итоговой
      - Кнопка «Оформить как заказ» создаёт заказ
    depends_on:
      - task-003
    related_feature: Калькулятор себестоимости заказа
    status: completed
    summary: "Реализована вкладка калькулятора себестоимости. Основной файл:
      components/cost-calculator.tsx (клиентский компонент с полями: изделие,
      клиент, масса, время печати, выбор катушки из склада, галочка
      постобработки с полем стоимости; мгновенный расчёт себестоимости пластика,
      стоимости работы (время × (тариф + амортизация)), общей себестоимости,
      маржинальности и чистой прибыли; поле окончательной стоимости с защитой от
      ввода меньше итоговой; кнопка «Оформить как заказ» создаёт заказ в
      LocalStorage и переключает на вкладку CRM). Компонент подключён в
      app-shell.tsx."
  - id: task-005
    phase: mvp
    title: CRM и история заказов
    description: "Реализовать вкладку CRM. Таблица заказов: ID, клиент, изделие,
      пластик, себестоимость, цена, статус, дата. Статусы цветными бейджами:
      «Принят», «Готов», «Выдан». При переводе в «Готов» — автоматическое
      списание веса с катушки. Фильтр по статусам."
    priority: high
    acceptance_criteria:
      - Таблица заказов отображается со всеми столбцами
      - Статусы отображаются цветными бейджами
      - При смене статуса на «Готов» вес списывается с катушки
      - Работает фильтрация по статусам
    depends_on:
      - task-004
    related_feature: CRM и история заказов
    status: completed
    summary: "Реализована вкладка CRM с таблицей заказов. Основные файлы:
      components/order-crm.tsx (клиентский компонент с таблицей: ID, клиент,
      изделие, пластик, себестоимость, цена, статус, дата; цветные бейджи
      статусов; клик по бейджу переключает статус по циклу Принят→Готов→Выдан;
      при переводе в «Готов» вес списывается с катушки; фильтрация по статусам
      через кнопки). Компонент подключён в app-shell.tsx вместо заглушки."
  - id: task-006
    phase: mvp
    title: Дашборд аналитики
    description:
      "Реализовать вкладку дашборда. Карточки KPI: общая выручка, чистая
      прибыль, активные заказы. Блок критических остатков (< 150г) с красной
      подсветкой. CSS-графики доходов за текущий месяц."
    priority: medium
    acceptance_criteria:
      - Отображается общая выручка, чистая прибыль, количество активных заказов
      - Список катушек с остатком < 150г выделен красным
      - График доходов за текущий месяц отображается
    depends_on:
      - task-005
    related_feature: Дашборд аналитики
    status: completed
    summary:
      "Реализована вкладка дашборда с карточками KPI (общая выручка, чистая
      прибыль, активные заказы), блоком критических остатков (< 150г) с красной
      подсветкой и CSS-графиком доходов за текущий месяц. Основная реализация:
      components/dashboard.tsx — клиентский компонент, читающий данные из
      LocalStorage через getStorage() и вычисляющий метрики. Подключён в
      components/app-shell.tsx вместо заглушки."
  - id: task-007
    phase: mvp
    title: Глобальные настройки
    description: "Реализовать модальное окно настроек (иконка шестерёнки). Поля:
      тариф электроэнергии (за час), амортизация оборудования (за час), валюта
      (BYN / RUB). Значения подтягиваются в калькулятор себестоимости."
    priority: medium
    acceptance_criteria:
      - Настройки сохраняются и применяются в расчётах
      - Тариф и амортизация предзаполнены значениями по умолчанию
      - Валюта переключается между BYN и RUB
    depends_on:
      - task-002
    related_feature: Глобальные настройки
    status: completed
    summary: "Реализовано модальное окно глобальных настроек с полями тарифа
      электроэнергии, амортизации оборудования и валюты (BYN/RUB). Значения по
      умолчанию: тариф 0.3, амортизация 0.5, валюта BYN. Основная реализация:
      components/settings-modal.tsx — модальное окно на базе shadcn Dialog,
      читающее/сохраняющее настройки в LocalStorage через существующий слой
      storage.ts. Калькулятор себестоимости (cost-calculator.tsx) подхватывает
      изменения настроек через settingsVersion."
  - id: task-008
    phase: mvp
    title: Лента постов (Feed)
    description:
      Реализовать вкладку ленты постов. Посты с текстом и прикреплёнными
      файлами. Отображается автор и время публикации. Хронологический порядок
      (сначала новые). Кнопка создания нового поста. Посты видны всем
      пользователям.
    priority: medium
    acceptance_criteria:
      - Лента отображается как отдельная вкладка
      - Посты в хронологическом порядке (сначала новые)
      - У каждого поста виден автор и дата/время
      - Можно создать новый пост с текстом и файлом
      - Посты сохраняются в LocalStorage
    depends_on:
      - task-002
    related_feature: Лента постов (Feed)
    status: completed
    summary: "Реализована вкладка ленты постов. Основная реализация:
      components/feed.tsx — клиентский компонент с формой создания поста (текст
      + файл до 5 МБ), лентой постов в хронологическом порядке (сначала новые),
      отображением автора и относительного времени публикации. Посты хранятся в
      AppData.posts LocalStorage и видны всем пользователям. В app-shell.tsx
      заглушка FeedTab заменена на компонент Feed. Добавлены мок-посты в
      lib/mock-data.ts."
  - id: task-009
    phase: mvp
    title: Выбор цвета катушки из RGB-палитры
    description:
      Заменить текущий выбор цвета (текстовое поле или простой select) на
      полноценную RGB-палитру при добавлении катушки. Пользователь должен иметь
      возможность выбрать любой цвет через визуальный интерфейс с ползунками R,
      G, B или готовую сетку цветов. Выбранный цвет отображается в виде цветного
      кружка/образца на карточке катушки.
    priority: medium
    acceptance_criteria:
      - При добавлении катушки вместо текстового поля цвета отображается
        RGB-палитра
      - Можно выбрать цвет через ползунки R, G, B или из сетки предустановленных
        цветов
      - Выбранный цвет отображается на карточке катушки в виде цветного
        индикатора
      - Цвет сохраняется в LocalStorage как hex-код
    depends_on:
      - task-003
    related_feature: Учёт катушек с пластиком (Filament Stock)
    status: completed
    summary:
      "Текстовое поле цвета в модальном окне добавления катушки заменено на
      RGB-палитру с тремя ползунками R, G, B (0-255) и превью выбранного цвета.
      Добавлена сетка из 28 предустановленных цветов для быстрого выбора. Цвет
      сохраняется в LocalStorage как hex-код (например, #ff8800). На карточке
      катушки цвет отображается в виде цветного индикатора и hex-текста.
      Основная реализация: components/filament-stock.tsx (AddSpoolDialog —
      ползунки, превью, сетка пресетов; SpoolCard — цветной индикатор)."
  - id: task-010
    phase: support
    title: Исправить ошибку Clipboard API и гидратации
    description: >-
      Диагностировать и исправить две ошибки в консоли браузера:

      1. NotAllowedError: Clipboard API заблокирован политикой permissions.
      Найти место, где вызывается navigator.clipboard.writeText(), и обернуть в
      try/catch или заменить на fallback-механизм.

      2. Hydration failed — серверный HTML не совпал с клиентским. Найти
      компоненты, которые используют window, localStorage, Date.now(),
      Math.random() или форматирование дат без динамического импорта/useEffect,
      и исправить, чтобы серверный рендеринг совпадал с клиентским.
    priority: high
    acceptance_criteria:
      - Ошибка Clipboard API не появляется в консоли при копировании
      - Ошибка гидратации не появляется в консоли при загрузке страницы
      - Приложение работает без видимых сбоев
    depends_on: []
    related_feature: Техническое сопровождение
    status: completed
    summary: "Исправлена ошибка гидратации: в `components/auth-provider.tsx`
      useState с инициализатором sessionStorage заменён на useState(null) +
      useEffect, чтобы сервер и клиент рендерили одинаковое начальное состояние.
      В `components/feed.tsx` formatDate() заменён на компонент TimeAgo с
      вычислением относительного времени в useEffect. В
      `components/dashboard.tsx` вызов getTodayDay() при рендере заменён на
      useState/useEffect. В `components/order-crm.tsx` toLocaleDateString
      заменён на ручное форматирование без локали. Clipboard API:
      navigator.clipboard.writeText() в кодовой базе не найден, ошибка
      невоспроизводима."
  - id: task-011
    phase: mvp
    title: Переименовать приложение в MINLAB 3D и добавить загрузку логотипа
    description:
      Сменить название приложения с «3D Print Manager» на «MINLAB 3D» во
      всех местах интерфейса (заголовок, вкладка браузера, боковое меню, экран
      входа). Добавить возможность загрузить своё фото/логотип — он отображается
      в боковом меню рядом с названием. Логотип сохраняется в LocalStorage.
    priority: high
    acceptance_criteria:
      - Название «MINLAB 3D» отображается в заголовке страницы и боковом меню
      - Вкладка браузера показывает «MINLAB 3D»
      - Можно загрузить изображение через кнопку в боковом меню
      - Загруженный логотип отображается рядом с названием в боковом меню
      - Логотип сохраняется в LocalStorage и не пропадает после перезагрузки
    depends_on:
      - task-002
    related_feature: Авторизация и профили
    status: completed
    summary: "Название приложения изменено с «3D Print Manager» на «MINLAB 3D» в
      layout.tsx (appName, тег title), app-shell.tsx (сайдбар + хедер) и
      auth-screen.tsx (экран входа). Добавлена загрузка логотипа: при наведении
      на иконку в сайдбаре появляется кнопка с камерой, выбранное изображение
      сохраняется в LocalStorage как data URL и восстанавливается после
      перезагрузки. Основные файлы: app/layout.tsx (константа appName),
      components/app-shell.tsx (лого + handleLogoChange + lazy init из
      localStorage), components/auth-screen.tsx (текст на экране входа)."
  - id: task-012
    phase: mvp
    title: Перенести логотип из бокового меню в шапку сайта
    description:
      Логотип сейчас отображается в боковом меню. Нужно перенести его в
      верхнюю шапку (хедер) — чтобы он был постоянно виден на всех страницах. В
      шапке отображается название «MINLAB 3D» и загруженное фото/логотип. Кнопка
      загрузки логотипа тоже в шапке.
    priority: high
    acceptance_criteria:
      - Логотип отображается в верхней шапке сайта, а не в боковом меню
      - Шапка видна на всех страницах приложения
      - Можно загрузить новое изображение через кнопку в шапке
      - Загруженный логотип сохраняется в LocalStorage
    depends_on:
      - task-011
    related_feature: Авторизация и профили
    status: completed
    summary:
      "Логотип перенесён из бокового меню в верхнюю шапку сайта. В компоненте
      app-shell.tsx: из sidebar header удалены блок логотипа, кнопка загрузки и
      скрытый input; они добавлены в header (top bar) — логотип (с
      fallback-иконкой HardDrive), кнопка загрузки с камерой (Camera) и название
      «MINLAB 3D» теперь отображаются в шапке на всех страницах. Загрузка
      изображения работает через тот же handleLogoChange с сохранением в
      LocalStorage. typecheck, lint, build — успешно."
  - id: task-013
    phase: support
    title: Настроить деплой приложения на хостинг
    description: Пользователь хочет залить сайт в интернет. Нужно собрать
      production-сборку (npm run build) и дать инструкцию по деплою на
      бесплатные/доступные хостинги (Vercel, Netlify, GitHub Pages и т.д.).
      Приложение статическое (Next.js с LocalStorage), подходит для статического
      хостинга.
    priority: medium
    acceptance_criteria:
      - Собрана production-сборка без ошибок
      - Дана понятная инструкция для деплоя
    depends_on: []
    related_feature: Техническое сопровождение
    status: completed
    summary: "Production-сборка (npm run build) собрана успешно: 3 статические
      страницы + 1 dynamic route (/api/health). Добавлена инструкция по деплою в
      DEPLOY.md: Vercel (рекомендуется, работает из коробки с serverless API),
      Netlify (через @netlify/plugin-nextjs), GitHub Pages (статический экспорт
      через OUTPUT_MODE=export, без API)."
  - id: task-014
    phase: support
    title: Исправить ошибку хранилища при авторизации на Vercel
    description:
      "При попытке войти в приложение на Vercel (production) появляется
